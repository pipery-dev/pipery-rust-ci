# GitLab CI Pipeline for pipery-rust-ci
# Rust compilation, testing, and publishing

variables:
  PROJECT_PATH: "."
  CONFIG_FILE: ".pipery/config.yaml"
  RUST_TOOLCHAIN: "stable"
  TESTS_PATH: ""
  FEATURES: ""
  TARGET: ""
  VERSION_BUMP: "patch"
  SKIP_SAST: "false"
  SKIP_SCA: "false"
  SKIP_LINT: "false"
  SKIP_BUILD: "false"
  SKIP_TEST: "false"
  SKIP_VERSIONING: "false"
  SKIP_PACKAGING: "false"
  SKIP_RELEASE: "false"
  SKIP_REINTEGRATION: "false"
  LOG_FILE: "pipery.jsonl"
  TARGET_BRANCH: "main"
  CRATES_TOKEN: ""
  GITHUB_TOKEN: ""

stages:
  - checkout
  - setup
  - sast
  - sca
  - lint
  - build
  - test
  - versioning
  - packaging
  - release
  - reintegration
  - logs

checkout:
  stage: checkout
  image: alpine:latest
  script:
    - echo "Repository checked out"

setup:
  stage: setup
  image: rust:${RUST_TOOLCHAIN}
  script:
    - rustc --version
    - cargo --version
    - cd $PROJECT_PATH
    - cargo fetch
    - echo "Setup complete"

sast_scan:
  stage: sast
  image: rust:${RUST_TOOLCHAIN}
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-sast.sh
  env:
    INPUT_PROJECT_PATH: $PROJECT_PATH
    INPUT_CONFIG_FILE: $CONFIG_FILE
    INPUT_LOG_FILE: $LOG_FILE
  allow_failure: true
  rules:
    - if: '$SKIP_SAST == "true"'
      when: never
    - when: on_success
  artifacts:
    paths:
      - $LOG_FILE
    expire_in: 30 days

sca_scan:
  stage: sca
  image: rust:${RUST_TOOLCHAIN}
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-sca.sh
  env:
    INPUT_PROJECT_PATH: $PROJECT_PATH
    INPUT_CONFIG_FILE: $CONFIG_FILE
    INPUT_LOG_FILE: $LOG_FILE
  allow_failure: true
  rules:
    - if: '$SKIP_SCA == "true"'
      when: never
    - when: on_success
  artifacts:
    paths:
      - $LOG_FILE
    expire_in: 30 days

lint:
  stage: lint
  image: rust:${RUST_TOOLCHAIN}
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-lint.sh
  env:
    INPUT_PROJECT_PATH: $PROJECT_PATH
    INPUT_LOG_FILE: $LOG_FILE
  rules:
    - if: '$SKIP_LINT == "true"'
      when: never
    - when: on_success
  allow_failure: true

build:
  stage: build
  image: rust:${RUST_TOOLCHAIN}
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-build.sh
  env:
    INPUT_PROJECT_PATH: $PROJECT_PATH
    INPUT_LOG_FILE: $LOG_FILE
  rules:
    - if: '$SKIP_BUILD == "true"'
      when: never
    - when: on_success
  artifacts:
    paths:
      - $PROJECT_PATH/target/release/
    expire_in: 1 day

test:
  stage: test
  image: rust:${RUST_TOOLCHAIN}
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-test.sh
  env:
    INPUT_PROJECT_PATH: $PROJECT_PATH
    INPUT_TESTS_PATH: $TESTS_PATH
    INPUT_LOG_FILE: $LOG_FILE
  rules:
    - if: '$SKIP_TEST == "true"'
      when: never
    - when: on_success
  artifacts:
    expire_in: 30 days

versioning:
  stage: versioning
  image: rust:${RUST_TOOLCHAIN}
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-version.sh
  env:
    INPUT_PROJECT_PATH: $PROJECT_PATH
    INPUT_VERSION_BUMP: $VERSION_BUMP
    INPUT_LOG_FILE: $LOG_FILE
  artifacts:
    paths:
      - version_info.txt
      - $LOG_FILE
    expire_in: 30 days
  rules:
    - if: '$SKIP_VERSIONING == "true"'
      when: never
    - when: on_success

packaging:
  stage: packaging
  image: rust:${RUST_TOOLCHAIN}
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-package.sh
  env:
    INPUT_PROJECT_PATH: $PROJECT_PATH
    INPUT_LOG_FILE: $LOG_FILE
  rules:
    - if: '$SKIP_PACKAGING == "true"'
      when: never
    - when: on_success

release:
  stage: release
  image: rust:${RUST_TOOLCHAIN}
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-release.sh
  env:
    INPUT_PROJECT_PATH: $PROJECT_PATH
    INPUT_CRATES_TOKEN: $CRATES_TOKEN
    INPUT_LOG_FILE: $LOG_FILE
  rules:
    - if: '$SKIP_RELEASE == "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $TARGET_BRANCH'
      when: on_success
    - when: manual

reintegration:
  stage: reintegration
  image: alpine:latest
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-reintegrate.sh
  env:
    INPUT_PROJECT_PATH: $PROJECT_PATH
    INPUT_LOG_FILE: $LOG_FILE
    INPUT_TARGET_BRANCH: $TARGET_BRANCH
    GITHUB_TOKEN: $GITHUB_TOKEN
  rules:
    - if: '$SKIP_REINTEGRATION == "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $TARGET_BRANCH'
      when: on_success
    - when: manual
  allow_failure: true

publish_logs:
  stage: logs
  image: alpine:latest
  script:
    - echo "Logs collected"
  artifacts:
    paths:
      - $LOG_FILE
      - version_info.txt
    expire_in: 90 days
  when: always
